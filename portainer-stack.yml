services:
  caddy:
    image: ghcr.io/mewejo/home-caddy-apps-proxy:latest
    container_name: caddy
    hostname: caddy
    restart: unless-stopped

    environment:
      # Cloudflare API token: Zone:Read + DNS:Edit on the zone.
      CF_API_TOKEN: ${CF_API_TOKEN}
      # Apps are served at *.APPS_DOMAIN, e.g. APPS_DOMAIN=apps.example.com
      APPS_DOMAIN: ${APPS_DOMAIN}
      # Comma-separated [name](upstream) pairs; name is served at
      # name.APPS_DOMAIN. https upstreams skip certificate verification.
      # e.g. APPS=[ns1](https://ns1.internal.example.com:443),[web](http://10.0.0.5:3000)
      APPS: ${APPS}

    volumes:
      - caddy_data:/data
      - caddy_config:/config

    networks:
      services-vlan:
        ipv4_address: 10.0.30.80
      # For upstream containers on the same Docker host, share an internal
      # bridge and proxy by container name, e.g. [app](http://container:port).
      # macvlan host isolation silently drops traffic between a macvlan
      # container and its own host, so the host's LAN IP is unreachable.
      # Create with: docker network create --internal proxy-net
      # (--internal: no gateway, so it can't steal the default route)
      # proxy-net: {}

networks:
  services-vlan:
    external: true
    name: services-vlan
  # proxy-net:
  #   external: true

volumes:
  caddy_data:
  caddy_config:
